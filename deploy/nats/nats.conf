# Orbit NATS server config — used by deploy/nats/Dockerfile.
#
# Local docker-compose passes the same flags via CLI; this file is the
# canonical source of truth for Saturn deploys where we cannot inject
# `-js` / `-m` / `--auth` into the start command via the UI. Keep both
# in sync.

# Client port. Default 4222 — keep explicit so misconfigured port
# overrides on Saturn surface as a startup error rather than silently
# binding to something else.
port: 4222

# HTTP monitoring endpoint — gateway's healthcheck and Prom scrapes hit
# /healthz and /jsz here.
http_port: 8222

# JetStream is required for the gateway's ORBIT stream (24h retention,
# Nats-Msg-Id dedup, message replay on WS reconnect). Without it the
# gateway falls back to core NATS and silently drops every replay
# guarantee — exactly the failure mode the 2026-05-04 audit caught
# in prod logs.
jetstream {
  store_dir: "/data/jetstream"
  max_memory_store: 256MB
  max_file_store: 2GB
}

# Token auth from env (NATS_TOKEN). NATS interpolates $VAR natively in
# config — no shell wrapper needed. If NATS_TOKEN is unset the server
# falls open with no auth, which we want to fail loudly: see Dockerfile
# entrypoint that aborts when the env var is empty.
authorization {
  token: $NATS_TOKEN
}

# Keep PID file so external healthcheck scripts can verify liveness.
pid_file: "/var/run/nats.pid"
