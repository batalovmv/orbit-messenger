# Orbit NATS server config — used by deploy/nats/Dockerfile.
#
# Local docker-compose passes the same flags via CLI; this file is the
# canonical source of truth for Saturn deploys where we cannot inject
# `-js` / `-m` / `--auth` into the start command via the UI. Keep both
# in sync.

# Client port. Default 4222 — keep explicit so misconfigured port
# overrides on Saturn surface as a startup error rather than silently
# binding to something else.
port: 4222

# HTTP monitoring endpoint — gateway's healthcheck and Prom scrapes hit
# /healthz and /jsz here.
http_port: 8222

# JetStream is required for the gateway's ORBIT stream (24h retention,
# Nats-Msg-Id dedup, message replay on WS reconnect). Without it the
# gateway falls back to core NATS and silently drops every replay
# guarantee — exactly the failure mode the 2026-05-04 audit caught
# in prod logs.
jetstream {
  store_dir: "/data/jetstream"
  max_memory_store: 256MB
  max_file_store: 2GB
}

# Auth note (2026-05-04):
#
# Originally this block enforced token auth via $NATS_TOKEN. We removed
# it because Saturn's Service-Connection feature auto-injects
# NATS_JS_URL into client services in the form `nats://nats-js:4222`
# WITHOUT any token — the platform has no way to embed a NATS-style
# token in the auto-generated URL. Re-enabling token auth caused every
# client (gateway, messaging, auth, calls, ai, bots, integrations,
# media) to crash-loop on `nats: Authorization Violation`.
#
# Risk assessment for this internal-only deploy:
#   - Saturn exposes services via HTTP routing on port 80; the NATS
#     protocol speaks raw TCP on 4222 and is NOT reachable from the
#     public internet (HTTP proxy 502s on non-HTTP traffic).
#   - Cross-project network isolation in Saturn's docker engine
#     prevents sibling tenants from reaching `nats-js:4222`.
#   - Therefore unauthenticated NATS is a network-internal-only
#     surface, equivalent to an unauthenticated postgres/redis
#     reachable only on the project's docker network.
#
# If we ever need defence-in-depth here, the path is: switch to
# nats.conf accounts + nkeys (Saturn-friendly because the secrets
# live in static config, not URLs), or layer mTLS on top.

# Keep PID file so external healthcheck scripts can verify liveness.
pid_file: "/var/run/nats.pid"
