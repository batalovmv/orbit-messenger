map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Re-resolve upstream hostnames every 10s. Without this, nginx resolves
# ${GATEWAY_URL} once at startup and caches the IP forever — so when Saturn
# rolling-deploys rebuild the gateway container with a new internal IP, we
# serve 502 until the web container is manually restarted. 127.0.0.11 is the
# standard Docker / Saturn embedded DNS resolver.
resolver 127.0.0.11 ipv6=off valid=10s;

# Web App Manifest needs the spec MIME type for full PWA validation;
# the default nginx mime.types only ships with /usr/share/nginx/html files.
types {
    application/manifest+json webmanifest;
}

server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy API requests to gateway (REST + WebSocket).
    # Assigning the upstream to a variable forces nginx to go through the
    # resolver on every request instead of using its startup-time cache.
    # IMPORTANT: with a variable in proxy_pass, nginx does NOT strip the
    # location prefix. We forward $request_uri explicitly so /api/v1/foo
    # reaches gateway as /api/v1/foo, not /api//api/v1/foo.
    location /api/ {
        set $gateway_upstream ${GATEWAY_URL};
        proxy_pass $gateway_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # nginx gotcha: add_header at server-level is NOT inherited into a
    # location block as soon as that location declares its own add_header.
    # Define security headers once in a snippet and include it in every
    # location where they are required.
    include /etc/nginx/snippets/security-headers.conf;

    # SPA fallback
    location / {
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|wasm|tgs|webp)$ {
        include /etc/nginx/snippets/security-headers.conf;
        expires 30d;
        add_header Cache-Control "public, immutable" always;
    }

    # No cache for index.html
    location = /index.html {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Web App Manifest needs the right MIME type for PWA validation.
    location ~* \.webmanifest$ {
        include /etc/nginx/snippets/security-headers.conf;
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=3600" always;
    }
}
