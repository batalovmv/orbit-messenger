map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Re-resolve upstream hostnames every 10s. Without this, nginx resolves
# ${GATEWAY_URL} once at startup and caches the IP forever — so when Saturn
# rolling-deploys rebuild the gateway container with a new internal IP, we
# serve 502 until the web container is manually restarted. 127.0.0.11 is the
# standard Docker / Saturn embedded DNS resolver.
resolver 127.0.0.11 ipv6=off valid=10s;

server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy API requests to gateway (REST + WebSocket).
    # Assigning the upstream to a variable forces nginx to go through the
    # resolver on every request instead of using its startup-time cache.
    location /api/ {
        set $gateway_upstream ${GATEWAY_URL};
        proxy_pass $gateway_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Security headers for all responses (CSP is handled by <meta> tag in index.html)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|wasm|tgs|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # No cache for index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
