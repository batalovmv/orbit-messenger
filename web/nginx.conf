map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Re-resolve upstream hostnames every 10s. Without this, nginx resolves
# ${GATEWAY_URL} once at startup and caches the IP forever — so when Saturn
# rolling-deploys rebuild the gateway container with a new internal IP, we
# serve 502 until the web container is manually restarted. 127.0.0.11 is the
# standard Docker / Saturn embedded DNS resolver.
resolver 127.0.0.11 ipv6=off valid=10s;

server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy API requests to gateway (REST + WebSocket).
    # Assigning the upstream to a variable forces nginx to go through the
    # resolver on every request instead of using its startup-time cache.
    # IMPORTANT: with a variable in proxy_pass, nginx does NOT strip the
    # location prefix. We forward $request_uri explicitly so /api/v1/foo
    # reaches gateway as /api/v1/foo, not /api//api/v1/foo.
    location /api/ {
        set $gateway_upstream ${GATEWAY_URL};
        proxy_pass $gateway_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Security headers for all responses (CSP is handled by <meta> tag in index.html)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Allow camera/microphone/screen-share for video calls but only same-origin;
    # explicitly deny powerful features the messenger doesn't use to reduce
    # surface area for compromised iframe or third-party content.
    add_header Permissions-Policy "camera=(self), microphone=(self), display-capture=(self), geolocation=(), payment=(), interest-cohort=(), browsing-topics=()" always;
    # Isolate the PWA from third-party windows opened via target=_blank or
    # popup. Without this a popup can window.opener.location an attacker
    # site, and SharedArrayBuffer-using libraries (rare, but possible if
    # we ever pull in WASM media tooling) need this for cross-origin isolation.
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|wasm|tgs|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # No cache for index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
