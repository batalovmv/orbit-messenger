name: Test & Deploy

on:
  push:
    branches: [master]

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Test auth service
        run: cd services/auth && go test ./... -count=1 -timeout 60s

      - name: Test messaging service
        run: cd services/messaging && go test ./... -count=1 -timeout 60s

      - name: Test gateway service
        run: cd services/gateway && go test ./... -count=1 -timeout 60s

  build-web:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/web:latest
          build-args: |
            SATURN_API_URL=https://new-tg-w2bvpo.saturn.ac

  # Deploy is handled by Saturn platform (auto-deploy on push)
  # Saturn pulls Docker images and manages service lifecycle
