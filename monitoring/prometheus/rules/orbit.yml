groups:
  - name: orbit.services
    interval: 30s
    rules:
      # Service is completely down (no scrape for 1 minute)
      - alert: ServiceDown
        expr: up{job="orbit"} == 0
        for: 1m
        labels:
          severity: critical
          service: "{{ $labels.instance }}"
        annotations:
          summary: "Service {{ $labels.instance }} is down"
          description: "{{ $labels.instance }} (job={{ $labels.job }}) has been unreachable for more than 1 minute."

      # High p99 latency (>500ms) on any service.
      # NOTE: metric name is `orbit_http_request_duration_seconds_bucket` —
      # services emit the prefixed form via pkg/metrics. The unprefixed name
      # used here previously never existed in the registry.
      - alert: HighLatency
        expr: |
          histogram_quantile(0.99,
            sum by (service, le) (
              rate(orbit_http_request_duration_seconds_bucket{job="orbit"}[5m])
            )
          ) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p99 latency on {{ $labels.service }}"
          description: "p99 latency on {{ $labels.service }} is {{ $value | humanizeDuration }} (threshold: 500ms)."

      # High 5xx error rate (>1% of requests).
      - alert: HighErrorRate
        expr: |
          sum by (service) (
            rate(orbit_http_requests_total{job="orbit", status=~"5.."}[5m])
          )
          /
          clamp_min(
            sum by (service) (
              rate(orbit_http_requests_total{job="orbit"}[5m])
            ),
            0.001
          ) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate on {{ $labels.service }}"
          description: "{{ $labels.service }} has {{ $value | humanizePercentage }} 5xx error rate (threshold: 1%)."

      # Critical error rate (>5%)
      - alert: CriticalErrorRate
        expr: |
          sum by (service) (
            rate(orbit_http_requests_total{job="orbit", status=~"5.."}[5m])
          )
          /
          clamp_min(
            sum by (service) (
              rate(orbit_http_requests_total{job="orbit"}[5m])
            ),
            0.001
          ) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical 5xx error rate on {{ $labels.service }}"
          description: "{{ $labels.service }} has {{ $value | humanizePercentage }} 5xx error rate (threshold: 5%)."

  - name: orbit.infrastructure
    interval: 60s
    rules:
      # WebSocket connection count spike (gateway). Steady-state ceiling check.
      - alert: HighWSConnections
        expr: orbit_ws_active_connections{service="gateway"} > 400
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High WebSocket connection count"
          description: "Gateway has {{ $value }} active WebSocket connections (threshold: 400)."

      # WS abnormal drop detector. Looks at the difference between the recent
      # peak and the recent floor of the active-connections gauge: if peak in
      # the last 5 min was >10 connections higher than the lowest value seen
      # in the last 2 min, something pulled connections down. `for: 2m`
      # requires the dip to persist so a transient single-minute blip does not
      # alert. Caveat: this still fires on a slow rolling deploy that holds
      # the new pod count below peak for longer than 2 min — accept that for
      # the 150-user pilot, revisit if it gets noisy.
      - alert: WSAbnormalDrops
        expr: |
          (
            max_over_time(orbit_ws_active_connections{service="gateway"}[5m])
            - min_over_time(orbit_ws_active_connections{service="gateway"}[2m])
          ) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "WebSocket connections dropped abnormally"
          description: "Gateway saw a sustained drop of {{ $value }} WS connections relative to the recent 5-min peak."

      # Push delivery failure rate >1% over 5 min. Counter is emitted by the
      # gateway push dispatcher with result={ok,fail,stale}. `stale` is the
      # 410/404 path where the subscription is gone — that is housekeeping,
      # not a delivery failure, so it is excluded from both numerator and
      # denominator. The `type` label (added 2026-05-04) is excluded from
      # aggregation so all real-traffic types (message, call, read_sync) feed
      # the same alert; admin_test is excluded so Push Inspector usage cannot
      # skew prod alerting.
      - alert: PushDeliveryFailureRate
        expr: |
          sum(rate(orbit_push_attempts_total{result="fail",type!="admin_test"}[5m]))
          /
          clamp_min(
            sum(rate(orbit_push_attempts_total{result=~"ok|fail",type!="admin_test"}[5m])),
            0.001
          ) > 0.01
        for: 5m
        labels:
          severity: warning
          service: gateway
        annotations:
          summary: "Web push delivery failure rate >1%"
          description: "Push delivery failure rate is {{ $value | humanizePercentage }} over the last 5 min (threshold: 1%). Check VAPID config, APNs/FCM provider status, and gateway logs."

      # Per-type breakdown so a regression isolated to call-push (incoming
      # ringer) does not get masked by a healthy message-push baseline. Higher
      # threshold — calls are spiky and a single failed device pushes the rate
      # above 1% trivially. 5% sustained for 10 min is the page-worthy floor.
      - alert: CallPushFailureRate
        expr: |
          sum(rate(orbit_push_attempts_total{result="fail",type="call"}[10m]))
          /
          clamp_min(
            sum(rate(orbit_push_attempts_total{result=~"ok|fail",type="call"}[10m])),
            0.001
          ) > 0.05
        for: 10m
        labels:
          severity: warning
          service: gateway
        annotations:
          summary: "Incoming call push failure rate >5%"
          description: "Call push failure rate is {{ $value | humanizePercentage }} over 10 min. Offline users on PWA are not getting incoming-call notifications. Check VAPID, recipient subscription validity, and gateway error logs for 'call push dispatch failed'."

      # Catches the failure mode the rate-based alert above silently misses:
      # if VAPID env vars are empty at gateway startup, the dispatcher's
      # Enabled() check returns false and EVERY send path early-returns nil
      # without incrementing orbit_push_attempts_total. Numerator stays at 0,
      # denominator stays at 0, and PushDeliveryFailureRate evaluates to 0/0
      # → never fires. The 2026-04-28 incident showed this can persist for
      # months. The gauge is set once at startup, so 5 min of "0" means the
      # gateway is currently disabled — not a transient.
      - alert: PushDispatcherDisabled
        expr: orbit_push_dispatcher_enabled == 0
        for: 5m
        labels:
          severity: critical
          service: gateway
        annotations:
          summary: "Gateway push dispatcher is disabled"
          description: "VAPID env vars are missing on gateway — all web push (incl. cross-device read-sync) silently no-ops. Check VAPID_PUBLIC_KEY/VAPID_PRIVATE_KEY/MESSAGING_URL on orbit-gateway and restart."

  # WAL archiving health. Source: postgres-exporter (monitoring profile).
  # Both alerts assume `archive_mode=on` per saturn-wal-pitr-enablement.md.
  # If the exporter is not running these silently never fire — pair with
  # ServiceDown on `up{job="postgres"} == 0`.
  - name: orbit.postgres
    interval: 60s
    rules:
      # Archiver has not pushed a WAL in 5 min. With archive_timeout=60s a
      # healthy stack pushes at least one WAL per minute under any non-zero
      # write load, and the archiver also force-rotates on idle. 5 min gives
      # us slack for true zero-write windows on dev. On prod under traffic,
      # 5 min of no archive == archive_command failing or postgres stuck.
      - alert: WalArchiveStalled
        expr: pg_stat_archiver_last_archive_age{job="postgres"} > 300
        for: 2m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "WAL archiving stalled (no push in {{ $value | humanizeDuration }})"
          description: "pg_stat_archiver.last_archived_time is older than 5 min. Either archive_command is failing (check postgres logs for wal-g errors) or wal-g cannot reach R2. RPO degrades to the timestamp of the last successful push."

      # Any archive_command failure since startup. failed_count is monotonic
      # so we alert on growth, not absolute value — a stale failure from
      # weeks ago should not page once recovered.
      - alert: WalArchiveFailures
        expr: increase(pg_stat_archiver_failed_count{job="postgres"}[10m]) > 0
        for: 1m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "WAL push failed {{ $value }} time(s) in 10 min"
          description: "wal-g rejected at least one WAL push. Investigate before failed_count climbs further — every failed segment is a gap in PITR coverage. Check R2 credentials, network from postgres container, and disk space in pg_wal."

  # JetStream health. Source: prometheus-nats-exporter (monitoring profile)
  # bridging NATS port 8222 → /metrics on :7777. Saturn-side requires the
  # same exporter wired against `nats-js:8222` and a scrape target added
  # to Saturn's managed Prom — see docs/runbooks/saturn-jetstream-prom.md.
  - name: orbit.nats
    interval: 60s
    rules:
      # Sustained backlog on any JetStream consumer. num_pending counts
      # messages already in the stream but not yet delivered to that
      # consumer. A healthy consumer drains in seconds; >1000 pending
      # for 5 min means the consumer is wedged or its workload outran
      # it (slow handler, downstream timeout, app crash-loop).
      - alert: JetStreamConsumerLag
        expr: jetstream_consumer_num_pending{job="nats"} > 1000
        for: 5m
        labels:
          severity: warning
          service: nats
        annotations:
          summary: "JetStream consumer {{ $labels.consumer_name }} lagging ({{ $value }} pending)"
          description: "Consumer {{ $labels.consumer_name }} on stream {{ $labels.stream_name }} has {{ $value }} pending messages for >5 min. Check the subscriber service logs (likely bots/messaging/integrations) for handler errors or restart-loops."

      # Consumer has unacked messages piling up — usually means the handler
      # is panicking or the ack policy is misconfigured. Different signal
      # from num_pending: those are undelivered, these are delivered but
      # not acked yet.
      - alert: JetStreamConsumerAckPending
        expr: jetstream_consumer_num_ack_pending{job="nats"} > 100
        for: 5m
        labels:
          severity: warning
          service: nats
        annotations:
          summary: "JetStream consumer {{ $labels.consumer_name }} not acking ({{ $value }} unacked)"
          description: "Consumer {{ $labels.consumer_name }} on stream {{ $labels.stream_name }} has {{ $value }} unacked messages for >5 min. Likely a handler panic — check service logs and look for redelivery storms."
