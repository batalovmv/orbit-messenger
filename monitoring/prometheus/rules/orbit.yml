groups:
  - name: orbit.services
    interval: 30s
    rules:
      # Service is completely down (no scrape for 1 minute)
      - alert: ServiceDown
        expr: up{job="orbit"} == 0
        for: 1m
        labels:
          severity: critical
          service: "{{ $labels.instance }}"
        annotations:
          summary: "Service {{ $labels.instance }} is down"
          description: "{{ $labels.instance }} (job={{ $labels.job }}) has been unreachable for more than 1 minute."

      # High p99 latency (>500ms) on any service
      - alert: HighLatency
        expr: |
          histogram_quantile(0.99,
            sum by (service, le) (
              rate(http_request_duration_seconds_bucket{job="orbit"}[5m])
            )
          ) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p99 latency on {{ $labels.service }}"
          description: "p99 latency on {{ $labels.service }} is {{ $value | humanizeDuration }} (threshold: 500ms)."

      # High 5xx error rate (>1% of requests)
      - alert: HighErrorRate
        expr: |
          sum by (service) (
            rate(http_requests_total{job="orbit", status=~"5.."}[5m])
          )
          /
          sum by (service) (
            rate(http_requests_total{job="orbit"}[5m])
          ) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate on {{ $labels.service }}"
          description: "{{ $labels.service }} has {{ $value | humanizePercentage }} 5xx error rate (threshold: 1%)."

      # Critical error rate (>5%)
      - alert: CriticalErrorRate
        expr: |
          sum by (service) (
            rate(http_requests_total{job="orbit", status=~"5.."}[5m])
          )
          /
          sum by (service) (
            rate(http_requests_total{job="orbit"}[5m])
          ) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical 5xx error rate on {{ $labels.service }}"
          description: "{{ $labels.service }} has {{ $value | humanizePercentage }} 5xx error rate (threshold: 5%)."

  - name: orbit.infrastructure
    interval: 60s
    rules:
      # PostgreSQL connection pool exhaustion
      - alert: HighDBConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High PostgreSQL connection count"
          description: "PostgreSQL has {{ $value }} active connections (threshold: 80)."

      # WebSocket connections spike (gateway)
      - alert: HighWSConnections
        expr: ws_active_connections > 400
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High WebSocket connection count"
          description: "Gateway has {{ $value }} active WebSocket connections (threshold: 400)."
