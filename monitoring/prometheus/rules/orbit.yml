groups:
  - name: orbit.services
    interval: 30s
    rules:
      # Service is completely down (no scrape for 1 minute)
      - alert: ServiceDown
        expr: up{job="orbit"} == 0
        for: 1m
        labels:
          severity: critical
          service: "{{ $labels.instance }}"
        annotations:
          summary: "Service {{ $labels.instance }} is down"
          description: "{{ $labels.instance }} (job={{ $labels.job }}) has been unreachable for more than 1 minute."

      # High p99 latency (>500ms) on any service.
      # NOTE: metric name is `orbit_http_request_duration_seconds_bucket` —
      # services emit the prefixed form via pkg/metrics. The unprefixed name
      # used here previously never existed in the registry.
      - alert: HighLatency
        expr: |
          histogram_quantile(0.99,
            sum by (service, le) (
              rate(orbit_http_request_duration_seconds_bucket{job="orbit"}[5m])
            )
          ) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p99 latency on {{ $labels.service }}"
          description: "p99 latency on {{ $labels.service }} is {{ $value | humanizeDuration }} (threshold: 500ms)."

      # High 5xx error rate (>1% of requests).
      - alert: HighErrorRate
        expr: |
          sum by (service) (
            rate(orbit_http_requests_total{job="orbit", status=~"5.."}[5m])
          )
          /
          clamp_min(
            sum by (service) (
              rate(orbit_http_requests_total{job="orbit"}[5m])
            ),
            0.001
          ) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate on {{ $labels.service }}"
          description: "{{ $labels.service }} has {{ $value | humanizePercentage }} 5xx error rate (threshold: 1%)."

      # Critical error rate (>5%)
      - alert: CriticalErrorRate
        expr: |
          sum by (service) (
            rate(orbit_http_requests_total{job="orbit", status=~"5.."}[5m])
          )
          /
          clamp_min(
            sum by (service) (
              rate(orbit_http_requests_total{job="orbit"}[5m])
            ),
            0.001
          ) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical 5xx error rate on {{ $labels.service }}"
          description: "{{ $labels.service }} has {{ $value | humanizePercentage }} 5xx error rate (threshold: 5%)."

  - name: orbit.infrastructure
    interval: 60s
    rules:
      # WebSocket connection count spike (gateway). Steady-state ceiling check.
      - alert: HighWSConnections
        expr: orbit_ws_active_connections{service="gateway"} > 400
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High WebSocket connection count"
          description: "Gateway has {{ $value }} active WebSocket connections (threshold: 400)."

      # WS abnormal drop detector. Looks at the difference between the recent
      # peak and the recent floor of the active-connections gauge: if peak in
      # the last 5 min was >10 connections higher than the lowest value seen
      # in the last 2 min, something pulled connections down. `for: 2m`
      # requires the dip to persist so a transient single-minute blip does not
      # alert. Caveat: this still fires on a slow rolling deploy that holds
      # the new pod count below peak for longer than 2 min — accept that for
      # the 150-user pilot, revisit if it gets noisy.
      - alert: WSAbnormalDrops
        expr: |
          (
            max_over_time(orbit_ws_active_connections{service="gateway"}[5m])
            - min_over_time(orbit_ws_active_connections{service="gateway"}[2m])
          ) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "WebSocket connections dropped abnormally"
          description: "Gateway saw a sustained drop of {{ $value }} WS connections relative to the recent 5-min peak."

      # Push delivery failure rate >1% over 5 min. Counter is emitted by the
      # gateway push dispatcher with result={ok,fail,stale}. `stale` is the
      # 410/404 path where the subscription is gone — that is housekeeping,
      # not a delivery failure, so it is excluded from both numerator and
      # denominator.
      - alert: PushDeliveryFailureRate
        expr: |
          sum(rate(orbit_push_attempts_total{result="fail"}[5m]))
          /
          clamp_min(
            sum(rate(orbit_push_attempts_total{result=~"ok|fail"}[5m])),
            0.001
          ) > 0.01
        for: 5m
        labels:
          severity: warning
          service: gateway
        annotations:
          summary: "Web push delivery failure rate >1%"
          description: "Push delivery failure rate is {{ $value | humanizePercentage }} over the last 5 min (threshold: 1%). Check VAPID config, APNs/FCM provider status, and gateway logs."

      # Catches the failure mode the rate-based alert above silently misses:
      # if VAPID env vars are empty at gateway startup, the dispatcher's
      # Enabled() check returns false and EVERY send path early-returns nil
      # without incrementing orbit_push_attempts_total. Numerator stays at 0,
      # denominator stays at 0, and PushDeliveryFailureRate evaluates to 0/0
      # → never fires. The 2026-04-28 incident showed this can persist for
      # months. The gauge is set once at startup, so 5 min of "0" means the
      # gateway is currently disabled — not a transient.
      - alert: PushDispatcherDisabled
        expr: orbit_push_dispatcher_enabled == 0
        for: 5m
        labels:
          severity: critical
          service: gateway
        annotations:
          summary: "Gateway push dispatcher is disabled"
          description: "VAPID env vars are missing on gateway — all web push (incl. cross-device read-sync) silently no-ops. Check VAPID_PUBLIC_KEY/VAPID_PRIVATE_KEY/MESSAGING_URL on orbit-gateway and restart."
