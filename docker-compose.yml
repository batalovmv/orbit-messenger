version: "3.9"

services:
  # ============================================================
  # Infrastructure
  # ============================================================

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orbit}
      POSTGRES_USER: ${POSTGRES_USER:-orbit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orbit}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring
    command: -js       # enable JetStream

  meilisearch:
    image: getmeili/meilisearch:v1.7
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:?Set MEILISEARCH_KEY in .env}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  # coturn — раскомментировать при Phase 6 (Calls)
  # coturn:
  #   image: coturn/coturn:4.6
  #   ports:
  #     - "3478:3478/tcp"
  #     - "3478:3478/udp"
  #   command: >
  #     -n --log-file=stdout
  #     --realm=${TURN_REALM:-orbit.local}
  #     --user=${TURN_USER:-orbit}:${TURN_PASSWORD}
  #     --lt-cred-mech

  # ============================================================
  # Application services
  # ============================================================

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      NATS_URL: nats://nats:4222
      AUTH_SERVICE_URL: http://auth:8081
      MESSAGING_SERVICE_URL: http://messaging:8082
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      redis: { condition: service_healthy }
      nats: { condition: service_started }
      auth: { condition: service_started }
      messaging: { condition: service_started }

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      DATABASE_URL: postgresql://${POSTGRES_USER:-orbit}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-orbit}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-720h}
      TOTP_ISSUER: ${TOTP_ISSUER:-Orbit}
      ORBIT_ADMIN_RESET_KEY: ${ORBIT_ADMIN_RESET_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  messaging:
    build:
      context: .
      dockerfile: services/messaging/Dockerfile
    ports:
      - "8082:8082"
    environment:
      PORT: "8082"
      DATABASE_URL: postgresql://${POSTGRES_USER:-orbit}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-orbit}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      NATS_URL: nats://nats:4222
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      nats: { condition: service_started }

  # web:
  #   build: ./web
  #   ports:
  #     - "3000:80"

volumes:
  postgres_data:
  redis_data:
  meili_data:
