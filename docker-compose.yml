version: "3.9"

services:
  # ============================================================
  # Infrastructure
  # ============================================================

  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orbit}
      POSTGRES_USER: ${POSTGRES_USER:-orbit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orbit}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2-alpine
    ports:
      - "127.0.0.1:4222:4222"   # client
      - "127.0.0.1:8222:8222"   # monitoring
    command: -js -m 8222 --auth ${NATS_TOKEN:?Set NATS_TOKEN in .env}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.7
    ports:
      - "127.0.0.1:7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:?Set MEILISEARCH_KEY in .env}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${R2_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${R2_SECRET_ACCESS_KEY:-minioadmin}
      MINIO_API_CORS_ALLOW_ORIGIN: http://localhost:3000,http://localhost:8080
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  # coturn — раскомментировать при Phase 6 (Calls)
  # coturn:
  #   image: coturn/coturn:4.6
  #   ports:
  #     - "3478:3478/tcp"
  #     - "3478:3478/udp"
  #   command: >
  #     -n --log-file=stdout
  #     --realm=${TURN_REALM:-orbit.local}
  #     --user=${TURN_USER:-orbit}:${TURN_PASSWORD}
  #     --lt-cred-mech

  # ============================================================
  # Application services
  # ============================================================

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ORBIT_NATS_URL: nats://${NATS_TOKEN}@nats:4222
      AUTH_SERVICE_URL: http://auth:8081
      MESSAGING_SERVICE_URL: http://messaging:8082
      MEDIA_SERVICE_URL: http://media:8083
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000,http://localhost:3300}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
    depends_on:
      redis: { condition: service_healthy }
      nats: { condition: service_healthy }
      auth: { condition: service_started }
      messaging: { condition: service_started }
      media: { condition: service_started }

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      PORT: "8081"
      DATABASE_URL: postgresql://${POSTGRES_USER:-orbit}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-orbit}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-720h}
      TOTP_ISSUER: ${TOTP_ISSUER:-Orbit}
      ORBIT_ADMIN_RESET_KEY: ${ORBIT_ADMIN_RESET_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000,http://localhost:3300}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  messaging:
    build:
      context: .
      dockerfile: services/messaging/Dockerfile
    ports:
      - "127.0.0.1:8082:8082"
    environment:
      PORT: "8082"
      DATABASE_URL: postgresql://${POSTGRES_USER:-orbit}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-orbit}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ORBIT_NATS_URL: nats://${NATS_TOKEN}@nats:4222
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_KEY: ${MEILISEARCH_KEY}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      nats: { condition: service_healthy }
      meilisearch: { condition: service_healthy }

  media:
    build:
      context: .
      dockerfile: services/media/Dockerfile
    ports:
      - "127.0.0.1:8083:8083"
    environment:
      PORT: "8083"
      DATABASE_URL: postgresql://${POSTGRES_USER:-orbit}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-orbit}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ORBIT_NATS_URL: nats://${NATS_TOKEN}@nats:4222
      R2_ENDPOINT: http://minio:9000
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-minioadmin}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-minioadmin}
      R2_BUCKET: ${R2_BUCKET:-orbit-media}
      R2_PUBLIC_ENDPOINT: ${R2_PUBLIC_ENDPOINT:-http://localhost:9000}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      nats: { condition: service_healthy }
      minio: { condition: service_healthy }

  web:
    build:
      context: ./web
      args:
        SATURN_API_URL: ${SATURN_API_URL:-http://localhost:8080/api/v1}
    ports:
      - "3000:80"
    environment:
      GATEWAY_URL: http://gateway:8080
    depends_on:
      - gateway

volumes:
  postgres_data:
  redis_data:
  meili_data:
  minio_data:
