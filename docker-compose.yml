version: "3.9"

services:
  # ============================================================
  # Infrastructure
  # ============================================================

  postgres:
    build:
      context: ./scripts/postgres
      dockerfile: Dockerfile.postgres
    ports:
      - "127.0.0.1:5434:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orbit}
      POSTGRES_USER: ${POSTGRES_USER:-orbit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      # R2/MinIO creds for wal-g (consumed via /etc/wal-g.env.sh by both
      # archive_command and base-backup runs). For local dev we point at
      # the in-stack `minio` service rather than the public R2 endpoint.
      R2_ENDPOINT: ${R2_ENDPOINT_INTERNAL:-http://minio:9000}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET:-orbit-media}
      R2_BACKUP_WAL_BUCKET: ${R2_BACKUP_WAL_BUCKET:-orbit-backup-wal}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orbit}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env} --save 900 1 --save 300 10 --save 60 10000 --save 60 1 --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2-alpine
    ports:
      - "127.0.0.1:4222:4222"   # client
      - "127.0.0.1:8222:8222"   # monitoring
    command: -js -m 8222 --auth ${NATS_TOKEN:?Set NATS_TOKEN in .env}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.7
    ports:
      - "127.0.0.1:7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:?Set MEILISEARCH_KEY in .env}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${R2_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${R2_SECRET_ACCESS_KEY:-minioadmin}
      MINIO_API_CORS_ALLOW_ORIGIN: http://localhost:3000,http://localhost:8080
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  coturn:
    image: coturn/coturn:4.6
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49152-49200:49152-49200/udp"
    command: >
      -n --log-file=stdout
      --realm=${TURN_REALM:-orbit.local}
      --user=${TURN_USER:?TURN_USER is required}:${TURN_PASSWORD:?TURN_PASSWORD is required}
      --lt-cred-mech
      --fingerprint
      --min-port=49152
      --max-port=49200

  # ============================================================
  # Application services
  # ============================================================

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ORBIT_NATS_URL: nats://${NATS_TOKEN}@nats:4222
      AUTH_URL: http://auth:8081
      MESSAGING_URL: http://messaging:8082
      MEDIA_URL: http://media:8083
      CALLS_URL: http://calls:8084
      BOTS_URL: http://bots:8086
      INTEGRATIONS_URL: http://integrations:8087
      AI_URL: http://ai:8085
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000,http://localhost:3300}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBSCRIBER_EMAIL: ${VAPID_SUBSCRIBER_EMAIL:-mailto:push@orbit.local}
    depends_on:
      redis: { condition: service_healthy }
      nats: { condition: service_healthy }
      auth: { condition: service_started }
      messaging: { condition: service_started }
      media: { condition: service_started }
      calls: { condition: service_started }
      ai: { condition: service_started }

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      PORT: "8081"
      DATABASE_URL: postgresql://${POSTGRES_USER:-orbit}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-orbit}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-720h}
      TOTP_ISSUER: ${TOTP_ISSUER:-Orbit}
      ORBIT_ADMIN_RESET_KEY: ${ORBIT_ADMIN_RESET_KEY}
      BOOTSTRAP_SECRET: ${BOOTSTRAP_SECRET:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000,http://localhost:3300}
      MESSAGING_URL: http://messaging:8082
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      MIGRATIONS_DIR: /migrations
    volumes:
      - ./migrations:/migrations:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  messaging:
    build:
      context: .
      dockerfile: services/messaging/Dockerfile
    ports:
      - "127.0.0.1:8082:8082"
    environment:
      PORT: "8082"
      DATABASE_URL: postgresql://${POSTGRES_USER:-orbit}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-orbit}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ORBIT_NATS_URL: nats://${NATS_TOKEN}@nats:4222
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      ORBIT_MESSAGE_ENCRYPTION_KEY: ${ORBIT_MESSAGE_ENCRYPTION_KEY}
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_KEY: ${MEILISEARCH_KEY}
      ORBIT_AI_BOT_USER_ID: ${ORBIT_AI_BOT_USER_ID:-}
      MEDIA_URL: http://media:8083
      AI_URL: http://ai:8085
      GATEWAY_URL: http://gateway:8080
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      nats: { condition: service_healthy }
      meilisearch: { condition: service_healthy }

  media:
    build:
      context: .
      dockerfile: services/media/Dockerfile
    ports:
      - "127.0.0.1:8083:8083"
    environment:
      PORT: "8083"
      DATABASE_URL: postgresql://${POSTGRES_USER:-orbit}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-orbit}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ORBIT_NATS_URL: nats://${NATS_TOKEN}@nats:4222
      R2_ENDPOINT: http://minio:9000
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-minioadmin}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-minioadmin}
      R2_BUCKET: ${R2_BUCKET:-orbit-media}
      R2_PUBLIC_ENDPOINT: ${R2_PUBLIC_ENDPOINT:-http://localhost:9000}
      CLAMAV_ADDR: clamav:3310
      CLAMAV_TIMEOUT: 10s
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      nats: { condition: service_healthy }
      minio: { condition: service_healthy }
      clamav: { condition: service_healthy }

  calls:
    build:
      context: .
      dockerfile: services/calls/Dockerfile
    ports:
      - "127.0.0.1:8084:8084"
    environment:
      PORT: "8084"
      DATABASE_URL: postgresql://${POSTGRES_USER:-orbit}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-orbit}?sslmode=disable
      ORBIT_NATS_URL: nats://${NATS_TOKEN}@nats:4222
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      # Public URL returned to browser clients — must be reachable from user machines.
      # host.docker.internal works when browser is on the same host as Docker Desktop.
      TURN_PUBLIC_URL: ${TURN_PUBLIC_URL:-turn:host.docker.internal:3478}
      TURN_USER: ${TURN_USER:?TURN_USER is required}
      TURN_PASSWORD: ${TURN_PASSWORD:?TURN_PASSWORD is required}
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_healthy }

  bots:
    build:
      context: .
      dockerfile: services/bots/Dockerfile
    ports:
      - "127.0.0.1:8086:8086"
    environment:
      PORT: "8086"
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ORBIT_NATS_URL: nats://${NATS_TOKEN}@nats:4222
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      MESSAGING_URL: http://messaging:8082
      MEDIA_URL: http://media:8083
      BOT_TOKEN_SECRET: ${BOT_TOKEN_SECRET}
      INTEGRATIONS_URL: http://integrations:8087
    depends_on:
      - postgres
      - redis
      - nats
      - messaging
      - integrations
    restart: unless-stopped

  integrations:
    build:
      context: .
      dockerfile: services/integrations/Dockerfile
    ports:
      - "127.0.0.1:8087:8087"
    environment:
      PORT: "8087"
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ORBIT_NATS_URL: nats://${NATS_TOKEN}@nats:4222
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      MESSAGING_URL: http://messaging:8082
    depends_on:
      - postgres
      - redis
      - nats
      - messaging
    restart: unless-stopped

  ai:
    build:
      context: .
      dockerfile: services/ai/Dockerfile
    ports:
      - "127.0.0.1:8085:8085"
    environment:
      PORT: "8085"
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      MESSAGING_URL: http://messaging:8082
      MEDIA_URL: http://media:8083
      # AI provider keys — placeholder by default so the service starts and
      # returns 503 ai_unavailable from every endpoint until real keys are
      # dropped into Saturn.ac dashboard. No rebuild needed to swap them in.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-placeholder}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      ANTHROPIC_CLASSIFY_MODEL: ${ANTHROPIC_CLASSIFY_MODEL:-claude-haiku-4-5}
      # Optional proxy override — local-only. Production must leave this unset
      # so calls go directly to https://api.anthropic.com/v1.
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-placeholder}
      WHISPER_MODEL: ${WHISPER_MODEL:-whisper-1}
    depends_on:
      - postgres
      - redis
      - messaging
      - media
    restart: unless-stopped


  clamav:
    image: clamav/clamav:latest
    ports:
      - "127.0.0.1:3310:3310"
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "echo PING | nc -w 5 localhost 3310"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
  web:
    build:
      context: ./web
      args:
        SATURN_API_URL: ${SATURN_API_URL:-http://localhost:8080/api/v1}
        VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
    ports:
      - "3000:80"
    environment:
      GATEWAY_URL: http://gateway:8080
    depends_on:
      - gateway

  # PostgreSQL backup. Runs supercronic which fires
  # scripts/backup-postgres.sh on the BACKUP_CRON schedule (default
  # every 4h on the hour, UTC). Dumps → gzip → gpg (AES-256) → R2. See
  # docs/runbook-restore.md for recovery.
  backup-cron:
    build:
      context: .
      dockerfile: deploy/backup-cron/Dockerfile
    environment:
      BACKUP_CRON: ${BACKUP_CRON:-0 */4 * * *}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      BACKUP_ENCRYPTION_PASSPHRASE: ${BACKUP_ENCRYPTION_PASSPHRASE}
      # Inside the docker network we always talk to the in-stack minio.
      # On Saturn this gets pointed at the real R2 endpoint via env override.
      R2_ENDPOINT: ${R2_ENDPOINT_INTERNAL:-http://minio:9000}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BACKUP_BUCKET: ${R2_BACKUP_BUCKET:-orbit-backups}
    depends_on:
      - postgres
    restart: unless-stopped

  # Prometheus scraper — local dev only. Saturn uses its own managed stack.
  # Pulls metrics from every service's /metrics endpoint. Services gate
  # /metrics behind the shared INTERNAL_SECRET.
  #     INTERNAL_SECRET, which we inject via
  # (only in external_labels), so the config is templated inline via
  # docker-compose `configs:` — compose itself expands ${INTERNAL_SECRET}
  # at `docker compose up` time.
  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    depends_on:
      - gateway
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager:/etc/alertmanager:ro
      - alertmanager_data:/alertmanager
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        if [ -n "$$ALERTMANAGER_WEBHOOK_URL" ]; then
          sed \
            -e "s|\$${ALERTMANAGER_WEBHOOK_URL}|$$ALERTMANAGER_WEBHOOK_URL|g" \
            -e "s|\$${ALERTMANAGER_WEBHOOK_SECRET}|$$ALERTMANAGER_WEBHOOK_SECRET|g" \
            /etc/alertmanager/alertmanager.yml > /tmp/alertmanager.yml
        else
          cat > /tmp/alertmanager.yml <<'EOF'
        global:
          resolve_timeout: 5m

        route:
          group_by: ['alertname', 'service']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          receiver: noop

        receivers:
          - name: noop

        inhibit_rules:
          - source_matchers:
              - severity="critical"
            target_matchers:
              - severity="warning"
            equal: ['alertname', 'service']
        EOF
        fi
        /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager
    environment:
      ALERTMANAGER_WEBHOOK_URL: ${ALERTMANAGER_WEBHOOK_URL:-}
      ALERTMANAGER_WEBHOOK_SECRET: ${ALERTMANAGER_WEBHOOK_SECRET:-}
    restart: unless-stopped

  # Grafana — local dev only. Auto-provisions the Prometheus datasource and
  # loads every dashboard JSON from monitoring/grafana/dashboards. Login:
  # admin / admin (you'll be asked to change on first login).
  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_USERS_DEFAULT_THEME: "dark"
      GF_LOG_LEVEL: "warn"
    depends_on:
      - prometheus
    restart: unless-stopped

configs:
  prometheus_config:
    content: |
      global:
        scrape_interval: 15s
        evaluation_interval: 15s

      scrape_configs:
        - job_name: orbit
          metrics_path: /metrics
          static_configs:
            - targets:
                - gateway:8080
                - auth:8081
                - messaging:8082
                - media:8083
                - calls:8084
                - ai:8085
                - bots:8086
                - integrations:8087
          http_headers:
            X-Internal-Token:
              values:
                - ${INTERNAL_SECRET}

      alerting:
        alertmanagers:
          - static_configs:
              - targets:
                  - alertmanager:9093

      rule_files:
        - /etc/prometheus/rules/*.yml

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  meili_data:
  clamav_data:
  minio_data:
  alertmanager_data:
